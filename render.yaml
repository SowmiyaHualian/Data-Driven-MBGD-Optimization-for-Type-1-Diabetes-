services:
  - type: web
    name: diagnosync
    env: python
    pythonVersion: 3.12
    plan: free
    buildCommand: >
      pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: API_HOST
        value: 0.0.0.0
      - key: API_WORKERS
        value: 1
      - key: SECRET_KEY
        generateValue: true
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
    healthCheckPath: /docs
    healthCheckInterval: 300

databases:
  - name: diagnosync-storage
    databaseName: diagnosync
    user: diagnosync_user
